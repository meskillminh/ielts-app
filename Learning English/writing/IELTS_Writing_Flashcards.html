<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IELTS Writing — Flashcards</title>
<style>
  :root {
    --bg: #f5f3ee;
    --card-bg: #faf9f5;
    --text: #1a1a1a;
    --subtext: #666;
    --border: #e0ddd6;
    --lesson-writing: #e6f1fb;
    --lesson-writing-border: #90bce8;
    --lesson-upgrade: #f0ebff;
    --lesson-upgrade-border: #9b7fe8;
    --section-border: #b0c8e8;
    --flipped-bg: #e1f5ee;
    --flipped-border: #1d9e75;
    --hover-border: #7c6fd4;
    --btn-bg: #fff;
    --btn-active-bg: #4a6fa5;
    --btn-active-text: #fff;
    --search-bg: #fff;
    --controls-bg: rgba(245,243,238,0.96);
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-hover: 0 6px 18px rgba(0,0,0,0.13);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1f; --card-bg: #22222a; --text: #e8e6e0; --subtext: #aaa;
      --border: #333; --lesson-writing: #1a2a3a; --lesson-writing-border: #3a6090;
      --lesson-upgrade: #1f1a2e; --lesson-upgrade-border: #6a4fb0;
      --section-border: #2a4a6a; --flipped-bg: #0d2a1e; --flipped-border: #1d9e75;
      --hover-border: #a090ee; --btn-bg: #2a2a35; --btn-active-bg: #4a6fa5;
      --btn-active-text: #fff; --search-bg: #2a2a35; --controls-bg: rgba(26,26,31,0.96);
      --shadow: 0 2px 8px rgba(0,0,0,0.3); --shadow-hover: 0 6px 18px rgba(0,0,0,0.45);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* CONTROLS */
  .controls { position: sticky; top: 0; z-index: 100; background: var(--controls-bg); backdrop-filter: blur(8px); padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
  .controls-top { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .site-title { font-size: 1rem; font-weight: 700; color: #4a6fa5; white-space: nowrap; }
  .search-wrap { flex: 1; min-width: 180px; }
  .search-wrap input { width: 100%; padding: 8px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--search-bg); color: var(--text); font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: #4a6fa5; }
  .counter { font-size: 0.82rem; color: var(--subtext); white-space: nowrap; }
  .btn-flip { padding: 7px 16px; border-radius: 16px; border: 1.5px solid var(--hover-border); background: var(--btn-bg); color: var(--hover-border); font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.2s, color 0.2s; }
  .btn-flip:hover { background: var(--hover-border); color: #fff; }
  .filters { display: flex; gap: 7px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 12px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--btn-bg); color: var(--subtext); font-size: 0.8rem; cursor: pointer; transition: all 0.18s; font-weight: 500; }
  .filter-btn:hover { border-color: #4a6fa5; color: #4a6fa5; }
  .filter-btn.active { background: var(--btn-active-bg); color: var(--btn-active-text); border-color: var(--btn-active-bg); }
  .filter-btn.upgrade { border-color: #9b7fe8; color: #7c6fd4; }
  .filter-btn.upgrade.active { background: #7c6fd4; border-color: #7c6fd4; }

  /* MAIN */
  main { padding: 24px 20px 56px; max-width: 1100px; margin: 0 auto; }

  /* LESSON BLOCK */
  .lesson-block { margin-bottom: 36px; border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); }
  .lesson-header { padding: 16px 22px; }
  .lesson-header.writing { background: var(--lesson-writing); border-left: 5px solid var(--lesson-writing-border); }
  .lesson-header.upgrade { background: var(--lesson-upgrade); border-left: 5px solid var(--lesson-upgrade-border); }
  .lesson-tag { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #4a6fa5; margin-bottom: 4px; }
  .lesson-tag.upgrade { color: #7c6fd4; }
  .lesson-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
  .lesson-subtitle { font-size: 0.82rem; color: var(--subtext); margin-top: 4px; }
  .lesson-body { background: var(--card-bg); padding: 20px; }

  /* SECTION */
  .section-block { margin-bottom: 28px; }
  .section-block:last-child { margin-bottom: 0; }
  .section-title { font-size: 0.85rem; font-weight: 700; color: #4a6fa5; border-bottom: 2px dashed var(--section-border); padding-bottom: 6px; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* CARD GRID */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }

  /* FLASHCARD */
  .card { background: var(--btn-bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s; user-select: none; min-height: 88px; position: relative; }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--hover-border); }
  .card.flipped { background: var(--flipped-bg); border-color: var(--flipped-border); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-front { font-size: 0.94rem; font-weight: 700; color: var(--text); flex: 1; line-height: 1.4; }
  .card-hint { font-size: 0.72rem; color: #bbb; margin-top: 5px; }
  .card.flipped .card-hint { display: none; }

  /* BAND BADGE */
  .band-badge { font-size: 0.68rem; font-weight: 800; padding: 2px 7px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 1px; }
  .band-b7 { background: #d4f5e9; color: #0e7a55; }
  .band-b6 { background: #fff3cd; color: #856404; }
  .band-fix { background: #fde8e8; color: #c0392b; }
  @media (prefers-color-scheme: dark) {
    .band-b7 { background: #0d3322; color: #4ecb96; }
    .band-b6 { background: #2d2200; color: #e0a800; }
    .band-fix { background: #3a0a0a; color: #f08080; }
  }

  /* CARD BACK */
  .card-back { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--flipped-border); }
  .card.flipped .card-back { display: block; }
  .card-vn { font-size: 0.87rem; color: #1d9e75; font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
  .card-ex { font-size: 0.81rem; color: var(--subtext); font-style: italic; line-height: 1.55; }
  .card-tip { font-size: 0.78rem; color: #c0392b; font-weight: 600; margin-top: 6px; padding: 5px 8px; background: #fde8e8; border-radius: 6px; line-height: 1.4; }
  @media (prefers-color-scheme: dark) { .card-tip { background: #3a0a0a; color: #f08080; } }

  /* PARAPHRASE BLOCK */
  .card-para { margin-top: 10px; padding: 9px 10px; background: #f0f7ff; border-radius: 8px; border-left: 3px solid #4a6fa5; font-size: 0.8rem; line-height: 1.55; }
  .card-para-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; color: #4a6fa5; }
  .card-para-original { color: #c0392b; margin-bottom: 5px; }
  .card-para-original span { font-style: italic; }
  .card-para-rephrased { color: #1d9e75; }
  .card-para-rephrased span { font-style: italic; font-weight: 600; }
  @media (prefers-color-scheme: dark) {
    .card-para { background: #1a2535; border-left-color: #4a6fa5; }
    .card-para-original { color: #f08080; }
    .card-para-rephrased { color: #4ecb96; }
  }

  /* SAMPLE SCRIPT PANEL */
  .script-panel { margin-top: 16px; border-radius: 10px; overflow: hidden; border: 1.5px solid var(--section-border); }
  .script-panel summary {
    list-style: none; cursor: pointer;
    padding: 10px 16px; font-size: 0.83rem; font-weight: 700;
    color: #4a6fa5; background: #eef5fd;
    display: flex; align-items: center; gap: 8px;
    user-select: none; transition: background 0.18s;
  }
  .script-panel summary::-webkit-details-marker { display: none; }
  .script-panel summary::before { content: "▶"; font-size: 0.65rem; transition: transform 0.2s; }
  .script-panel[open] summary::before { transform: rotate(90deg); }
  .script-panel summary:hover { background: #ddeaf8; }
  .script-body { padding: 14px 18px; background: #f8fcff; font-size: 0.85rem; line-height: 1.75; color: var(--text); }
  .script-body p { margin-bottom: 10px; }
  .script-body p:last-child { margin-bottom: 0; }
  .script-body strong { color: #2563a8; background: #dbeafe; padding: 1px 3px; border-radius: 3px; font-weight: 700; }
  .script-body .script-label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: #4a6fa5; display: block; margin: 10px 0 3px; }
  .script-body .bad { color: #c0392b; }
  .script-body .bad strong { background: #fde8e8; color: #c0392b; }
  .script-body .good { color: #1d9e75; }
  .script-body .good strong { background: #d4f5e9; color: #0e7a55; }
  .script-body .tip-box { background: #fff9e6; border-left: 3px solid #e0a800; padding: 8px 12px; border-radius: 0 6px 6px 0; margin-top: 10px; font-size: 0.8rem; color: #856404; }
  @media (prefers-color-scheme: dark) {
    .script-panel { border-color: #2a4a6a; }
    .script-panel summary { background: #1a2535; color: #7ab0dc; }
    .script-panel summary:hover { background: #1e2f45; }
    .script-body { background: #16202c; }
    .script-body strong { background: #1a3055; color: #7ab0dc; }
    .script-body .bad strong { background: #3a0a0a; color: #f08080; }
    .script-body .good strong { background: #0d3322; color: #4ecb96; }
    .script-body .tip-box { background: #2a1f00; border-left-color: #e0a800; color: #e0c060; }
  }

  /* EMPTY */
  .empty { text-align: center; color: var(--subtext); padding: 60px 20px; font-size: 1rem; }

  /* MOBILE */
  @media (max-width: 600px) {
    .controls { padding: 10px 14px; }
    main { padding: 16px 12px 40px; }
    .card-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .lesson-body { padding: 14px; }
    .card { min-height: 80px; padding: 12px; }
    .script-body { padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="controls">
  <div class="controls-top">
    <span class="site-title">✍️ IELTS Writing</span>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search expressions, Vietnamese, examples…" oninput="render()" />
    </div>
    <span class="counter" id="counter">— / — expressions</span>
    <button class="btn-flip" onclick="flipAll()">🔄 Flip all</button>
  </div>
  <div class="filters" id="filterBar"></div>
</div>

<main id="mainContent"></main>

<script>
const lessons = [
  {
    id: "L1W", type: "writing",
    tag: "Lesson 1 — Writing Task 1",
    title: "Cấu trúc câu mô tả xu hướng",
    sections: [
      {
        title: "📌 Quantifiers — Chủ ngữ mô tả số liệu",
        items: [
          { e: "the number of + countable noun", v: "→ số lượng của... (danh từ đếm được)", ex: "The number of students increased to 1,200 in 2005." },
          { e: "the amount of + uncountable noun", v: "→ lượng... (danh từ không đếm được)", ex: "The amount of water consumed per day was 50 litres." },
          { e: "the percentage / proportion of", v: "→ tỷ lệ / phần trăm của...", ex: "The percentage of obese children in America was 15%." },
          { e: "the unemployment rate", v: "→ tỷ lệ thất nghiệp (cụm cố định)", ex: "The unemployment rate in Japan in 2015 was 4%." },
          { e: "the birth rate / the death rate", v: "→ tỷ lệ sinh / tử vong (cụm cố định)", ex: "The birth rate in Canada fluctuated between 10% and 15%." },
          { e: "the price of something", v: "→ giá của... (KHÔNG dùng 'amount of price')", ex: "The price of petrol rose considerably in 2022." },
          { e: "the sales of something", v: "→ doanh số bán... (KHÔNG dùng 'number of sales')", ex: "The sales of CDs increased dramatically in the 1980s." },
          { e: "the income of something", v: "→ thu nhập của... (KHÔNG dùng 'amount of income')", ex: "The income of people in Vietnam rose slightly over the period." },
          { e: "this figure", v: "→ số liệu này (khi S2 = S1 — cùng đối tượng)", ex: "The number of students in 1960 was 100. This figure in 1970 was 200." },
          { e: "the figure for something", v: "→ số liệu cho... (khi S2 ≠ S1 — khác đối tượng)", ex: "The amount of chicken was 250g. The figure for beef was 100g." }
        ],
        script: {
          title: "UK Household Spending (2000–2020)",
          content: `<span class="script-label">📊 Full Sample Paragraph</span>
<p>The line graph illustrates changes in household expenditure in the UK from 2000 to 2020.</p>
<p><strong>The number of</strong> households spending over £500 per month on rent rose sharply over the period. <strong>The amount of</strong> money spent on food also increased, from £250 to £380 per month. Meanwhile, <strong>the percentage of</strong> income spent on transport remained stable at around 15%.</p>
<p><strong>The unemployment rate</strong> fell from 7% in 2010 to 3.8% in 2020. <strong>The price of</strong> energy climbed considerably, while <strong>the sales of</strong> electric vehicles grew dramatically in the final five years. Among all categories, housing costs were consistently the highest. <strong>This figure</strong> nearly doubled over the period, while <strong>the figure for</strong> entertainment remained the lowest throughout.</p>
<div class="tip-box">💡 Tip: Use <em>this figure</em> when your subject stays the same. Use <em>the figure for</em> when you switch to a different subject.</div>`
        }
      },
      {
        title: "📈 Verbs & Nouns — Xu hướng TĂNG",
        items: [
          { e: "to rise / a rise", v: "→ tăng / sự tăng", ex: "The number of internet users rose steadily over the period." },
          { e: "to increase / an increase", v: "→ tăng / sự tăng (phổ biến nhất)", ex: "The amount of energy used increased dramatically in 2010." },
          { e: "to grow / a growth", v: "→ tăng trưởng (không dùng với tiền)", ex: "The number of students grew from 10,000 to 18,000 in 2019." },
          { e: "to climb / a climb", v: "→ leo thang / sự tăng", ex: "The price of oil climbed sharply throughout the period." },
          { e: "to go up", v: "→ tăng lên (thông thường)", ex: "Car sales went up gradually over the period." },
          { e: "an upward trend", v: "→ xu hướng tăng", ex: "There was a clear upward trend in internet usage from 2000 to 2020." }
        ],
        script: {
          title: "International Students in Australia (2000–2020)",
          content: `<span class="script-label">📊 Full Sample Paragraph</span>
<p>The line graph illustrates the growth in international student enrolment in Australia from 2000 to 2020.</p>
<p>In 2000, approximately 150,000 students were enrolled in Australian universities. This figure <strong>rose</strong> steadily to 200,000 by 2005, reflecting growing global interest in Australian education. Between 2005 and 2010, enrolment <strong>climbed</strong> more rapidly, reaching 280,000. Student numbers then <strong>grew</strong> dramatically to a peak of 450,000 by 2015. The figure continued to <strong>go up</strong>, reaching 560,000 in 2019 — a clear <strong>upward trend</strong> driven by government policy and improved university rankings. Overall, the total <strong>increase</strong> over the 20-year period was nearly fourfold.</p>
<div class="tip-box">💡 Tip: Vary your verbs! Don't use "increased" in every sentence. Try: rose → climbed → grew → went up → reached.</div>`
        }
      },
      {
        title: "📉 Verbs & Nouns — Xu hướng GIẢM",
        items: [
          { e: "to decrease / a decrease", v: "→ giảm / sự giảm", ex: "The unemployment rate decreased from 10% to 6% between 2010 and 2018." },
          { e: "to fall / a fall", v: "→ giảm / sự giảm (thường dùng khi giảm đột ngột)", ex: "The number of tourists fell sharply in 2020." },
          { e: "to drop / a drop", v: "→ giảm (mạnh) / sự giảm", ex: "The unemployment rate experienced a gradual drop to 3% during the decade." },
          { e: "to reduce / a reduction", v: "→ giảm / sự giảm bớt", ex: "There was a considerable reduction in sugar consumption in 2002." },
          { e: "to decline / a decline", v: "→ suy giảm / sự suy giảm", ex: "The number of smokers declined significantly from 2010 to 2020." },
          { e: "to go down", v: "→ đi xuống / giảm (thông thường)", ex: "The figure for exports went down slightly in the final year." },
          { e: "a downward trend", v: "→ xu hướng giảm", ex: "The data showed a clear downward trend in coal consumption." }
        ],
        script: {
          title: "Coal Consumption in Europe (1990–2020)",
          content: `<span class="script-label">📊 Full Sample Paragraph</span>
<p>The bar chart provides information about coal consumption in three European countries from 1990 to 2020.</p>
<p>In the UK, coal usage <strong>decreased</strong> considerably from 120 million tonnes in 1990 to 80 million tonnes in 2000. It then <strong>fell</strong> sharply to just 45 million tonnes by 2010 — a <strong>reduction</strong> of more than 60% in just two decades. A clear <strong>downward trend</strong> was visible throughout, with the figure <strong>going down</strong> to a record low of 15 million tonnes in 2020.</p>
<p>In Germany, consumption <strong>dropped</strong> moderately from 250 to 180 million tonnes. It then <strong>declined</strong> more rapidly between 2015 and 2020, reaching 120 million tonnes. Spain also showed a <strong>decrease</strong>, though the <strong>fall</strong> was less dramatic — from 90 to 55 million tonnes over the full period.</p>
<div class="tip-box">💡 Tip: "Fall" and "drop" suggest a sudden change. "Decline" and "decrease" are more neutral. "Reduce" often implies intentional action.</div>`
        }
      },
      {
        title: "➡️ Verbs — Xu hướng ĐẶC BIỆT (ổn định / dao động / đỉnh / đáy)",
        items: [
          { e: "to remain unchanged / remain constant / remain steady / remain stable", v: "→ giữ nguyên / duy trì ổn định (các biến thể)", ex: "The proportion remained unchanged at 40% throughout the period." },
          { e: "to stabilize", v: "→ ổn định lại (sau biến động)", ex: "The figures stabilized after the sharp rise in 2018." },
          { e: "to fluctuate / a fluctuation", v: "→ dao động (lên xuống ≥3 lần liên tiếp)", ex: "The birth rate fluctuated between 10% and 15% from 2000 to 2010." },
          { e: "to peak at / reach its peak of", v: "→ đạt đỉnh ở mức / của", ex: "The percentage of visitors peaked at 45% in 1995." },
          { e: "to reach its highest point of", v: "→ chạm đỉnh ở mức", ex: "Car sales reached their highest point of $8 million in 2019." },
          { e: "to hit its lowest point of", v: "→ chạm đáy ở mức", ex: "It hit its lowest point of 5% in 1995." }
        ],
        script: {
          title: "Social Media Usage in the USA (2005–2020)",
          content: `<span class="script-label">📊 Full Sample Paragraph</span>
<p>The line graph illustrates social media usage among US adults from 2005 to 2020.</p>
<p>Usage <strong>fluctuated</strong> between 5% and 9% from 2005 to 2008 before rising sharply. The proportion then <strong>peaked at</strong> 79% in 2018 — the highest point across the entire period. After that, the figure <strong>remained stable</strong> at around 72–75%, suggesting the market had reached near-saturation. Analysts expect it to <strong>stabilize</strong> at around 80% by 2025.</p>
<p>Among older adults (65+), usage <strong>hit its lowest point of</strong> just 2% in 2007 before climbing gradually. By 2016, this figure had <strong>stabilized</strong> at approximately 34%, where it <strong>remained unchanged</strong> for two years before rising again to <strong>reach its highest point of</strong> 40% in 2020.</p>
<div class="tip-box">💡 Tip: Use <em>fluctuated</em> only when the data goes up AND down multiple times. If it just stays flat, use <em>remained stable / unchanged</em>.</div>`
        }
      },
      {
        title: "🎚️ Adjectives & Adverbs — Mức độ thay đổi",
        items: [
          { e: "dramatic / dramatically", v: "→ rất mạnh / đột ngột (mạnh nhất)", ex: "The number of users increased dramatically over the decade." },
          { e: "rapid / rapidly", v: "→ nhanh (trong thời gian ngắn)", ex: "There was a rapid rise in car sales during 2018." },
          { e: "sharp / sharply", v: "→ đột ngột và mạnh (thời gian ngắn)", ex: "The price fell sharply to $50 per barrel in just one week." },
          { e: "significant / significantly", v: "→ đáng kể (phổ biến nhất)", ex: "The unemployment rate decreased significantly over the decade." },
          { e: "considerable / considerably", v: "→ đáng kể (lượng khá lớn)", ex: "There was a considerable decrease in laptop exports." },
          { e: "substantial / substantially", v: "→ đáng kể (lượng lớn, trang trọng)", ex: "The amount of energy used increased substantially." },
          { e: "remarkable / remarkably", v: "→ đáng chú ý / ấn tượng", ex: "The company recorded a remarkable growth in profits in 2019." },
          { e: "gradual / gradually", v: "→ dần dần / từ từ", ex: "The number of students studying abroad grew gradually over the period." },
          { e: "moderate / moderately", v: "→ vừa phải", ex: "Reading activities increased moderately from 30% to 45%." },
          { e: "steady / steadily", v: "→ đều đặn / ổn định", ex: "Car sales rose steadily throughout the period." },
          { e: "slight / slightly", v: "→ nhẹ / hơi (thay đổi nhỏ)", ex: "The amount of water used fell slightly at the beginning of the period." },
          { e: "marginal / marginally", v: "→ rất nhỏ / không đáng kể", ex: "There was a marginal increase in internet usage from 1990 to 2000." },
          { e: "minimal / minimally", v: "→ cực nhỏ / gần như không đổi", ex: "The figure rose minimally to just under 100 grams in 1980." }
        ],
        script: {
          title: "Renewable Energy Production in 4 Countries (2000–2020)",

        ],
        script: {
          title: "Full Paraphrased Introduction — Before & After",
          content: `<span class="script-label">📊 Real exam task → full paraphrased opening sentence</span>
<p class="bad">❌ ORIGINAL (do NOT copy this):<br>
<strong>"The graph below shows the number of tourists who visited four different attractions in Brighton between 2010 and 2020."</strong></p>
<p class="good">✅ PARAPHRASED (band 7 level):<br>
<strong>"The line graph illustrates how visitor numbers at four tourist attractions in Brighton fluctuated over a 10-year period from 2010 to 2020."</strong></p>
<p><strong>What changed:</strong><br>
• "graph shows" → "<strong>line graph illustrates</strong>"<br>
• "number of tourists who visited" → "<strong>visitor numbers at</strong>"<br>
• "between 2010 and 2020" → "<strong>over a 10-year period from 2010 to 2020</strong>"<br>
• "different attractions" → "<strong>tourist attractions</strong>"</p>
<div class="tip-box">💡 You only need to change 3–4 key words. You don't need to rearrange the whole sentence. Focus on the main verb and the subject noun first.</div>`
        }
      },
      {
        title: "📊 Comparison Language — Ngôn ngữ so sánh (cho bar chart, pie chart)",
        items: [
          { e: "account for / make up / represent / constitute + %", v: "→ chiếm (tỉ lệ %)... (dùng cho pie chart, phần trăm)", ex: "Transport accounted for 30% of total household spending in 2005.", band: "b7" },
          { e: "higher than / lower than", v: "→ cao hơn / thấp hơn (so sánh trực tiếp)", ex: "Car ownership in the UK was significantly higher than in France throughout the period.", band: "b6" },
          { e: "twice as much as / three times as many as", v: "→ gấp đôi / gấp ba (so sánh bội số)", ex: "China produced twice as much electricity as India in 2010.", band: "b7" },
          { e: "compared to / in comparison with", v: "→ so với / khi so sánh với", ex: "Compared to 1990, the number of internet users was ten times higher in 2010.", band: "b6" },
          { e: "far higher / significantly lower / considerably more", v: "→ cao hơn nhiều / thấp hơn đáng kể / nhiều hơn đáng kể", ex: "The proportion of elderly internet users was far lower than that of younger groups.", band: "b7" },
          { e: "the highest / the lowest / the second highest", v: "→ cao nhất / thấp nhất / cao thứ hai", ex: "China recorded the highest growth rate, while Japan had the lowest.", band: "b6" },
          { e: "more than / less than / over / under", v: "→ hơn / ít hơn / trên / dưới", ex: "More than half of the population used smartphones by 2015.", band: "b6" },
          { e: "at [X]%, [Subject] was the largest / smallest category", v: "→ Ở mức [X]%, [Chủ đề] là danh mục lớn nhất / nhỏ nhất", ex: "At 45%, housing was the largest category of household expenditure.", band: "b7" }
        ],
        script: {
          title: "UK Household Expenditure Pie Chart (2020) — Full Description",
          content: `<span class="script-label">📊 Full paragraph using comparison language — great for pie charts</span>
<p>The pie chart illustrates UK household expenditure in 2020.</p>
<p>Housing <strong>accounted for</strong> the largest share <strong>at</strong> 35%, which was <strong>far higher than</strong> any other category. Food and drink <strong>made up</strong> 20% of total spending — <strong>twice as much as</strong> transport, which <strong>represented</strong> just 10%. <strong>In comparison with</strong> clothing (8%), entertainment was slightly <strong>higher at</strong> 12%.</p>
<p>The figure for education was <strong>considerably lower than</strong> healthcare — at 5% and 10% respectively. <strong>The lowest</strong> category was education, while housing was clearly <strong>the highest</strong>. <strong>More than</strong> half of all expenditure went to just two categories: housing and food.</p>
<div class="tip-box">💡 For pie charts: always start with the biggest/smallest slice, use "account for / make up / represent" to describe shares, and compare at least 2 items directly using "compared to" or "twice as much as".</div>`
        }
      },
      {
        title: "🎯 Grouping & Selecting Key Features — Chọn & nhóm ý chính",
        items: [
          { e: "The most striking feature is…", v: "→ Đặc điểm nổi bật nhất là...", ex: "The most striking feature is the dramatic increase in online shopping between 2015 and 2020.", band: "b7" },
          { e: "Notably, …", v: "→ Đáng chú ý là,...", ex: "Notably, both countries experienced a sharp decline after 2010.", band: "b7" },
          { e: "It is worth noting that…", v: "→ Điều đáng chú ý là...", ex: "It is worth noting that despite the overall upward trend, there was a brief dip in 2008.", band: "b7" },
          { e: "In terms of [category], …", v: "→ Về [phạm trù],...", ex: "In terms of age groups, the 18–25 bracket showed the most significant increase.", band: "b6" },
          { e: "Looking at [subject] in more detail, …", v: "→ Nhìn vào [đối tượng] chi tiết hơn,...", ex: "Looking at China in more detail, it experienced three distinct phases of growth.", band: "b7" },
          { e: "Turning to [subject], …", v: "→ Chuyển sang [đối tượng],...", ex: "Turning to the data for women, the pattern is quite different.", band: "b7" },
          { e: "With regard to / Regarding [subject], …", v: "→ Về việc / Đối với [chủ đề],...", ex: "With regard to energy consumption, the figures tell a very different story.", band: "b6" }
        ],
        script: {
          title: "Tourist Attractions — Full Body Paragraph Using Grouping Phrases",
          content: `<span class="script-label">📊 Full body paragraph — notice how grouping phrases guide the reader through the data</span>
<p>The line graph illustrates visitor numbers at four London attractions from 1980 to 2010.</p>
<p><strong>The most striking feature is</strong> the dramatic rise in Castle visitors, which increased from 23% to 45% over the period. <strong>Notably</strong>, the Castle overtook the Festival as the most popular attraction by 1990.</p>
<p><strong>In terms of</strong> the Zoo and Aquarium, both showed moderate growth before declining in the final decade. <strong>It is worth noting that</strong> the Aquarium experienced the most dramatic fluctuation — peaking at 35% in 1990 before falling sharply.</p>
<p><strong>Turning to</strong> the Festival, this attraction saw the most consistent downward trend, declining steadily from 40% to under 15% by 2010. <strong>With regard to</strong> overall patterns, three of the four venues declined in the latter half of the period.</p>
<div class="tip-box">💡 Band 5 mistake: describing every data point in chronological order. Band 7 strategy: group data by pattern (those that rose vs those that fell), then use these phrases to guide the reader between groups.</div>`
        }
      },
      {
        title: "🚨 Common Mistakes — Lỗi thường gặp ở Band 5-6",
        items: [
          { e: "rose TO 50% ✅  vs  rose BY 20% ✅", v: "→ TO = giá trị cuối | BY = mức độ thay đổi (LỖI PHỔ BIẾN NHẤT!)", ex: "Sales rose TO $200 million. / Sales rose BY $50 million (from $150m to $200m).", band: "fix", tip: "❌ Sales rose by $200 million. (khi $200m là giá trị cuối, không phải khoảng tăng)" },
          { e: "The number of students WAS ✅  (NOT 'were')", v: "→ 'the number of' = chủ ngữ số ÍT → động từ số ít", ex: "The number of international students was 50,000 in 2010.", band: "fix", tip: "❌ The number of students were 50,000. → Sai vì 'the number' là chủ ngữ" },
          { e: "an increase IN something ✅  (NOT 'increase of')", v: "→ tăng TRONG [cái gì] = 'increase in', không phải 'of'", ex: "There was a significant increase in the number of visitors.", band: "fix", tip: "❌ There was an increase of the number of visitors." },
          { e: "The data SHOWS ✅  (NOT 'show')", v: "→ 'data' trong IELTS = danh từ số ÍT", ex: "The data shows a clear upward trend in energy consumption.", band: "fix", tip: "❌ The data show... (trong IELTS academic, 'data' = số ít)" },
          { e: "decreased FROM 2010 TO 2020 ✅  (NOT 'until')", v: "→ dùng 'from...to...' hoặc 'between...and...' cho khoảng thời gian", ex: "The rate decreased from 10% in 2010 to 6% in 2020.", band: "fix", tip: "❌ decreased from 2010 until 2020" },
          { e: "the sales OF CDs ✅  (NOT 'sales in CDs')", v: "→ sales OF [thứ gì đó], không phải 'sales in'", ex: "The sales of electric vehicles increased dramatically between 2015 and 2020.", band: "fix", tip: "❌ the sales in CDs / the number of sales" },
          { e: "Use PAST TENSE for past data ✅", v: "→ Biểu đồ có số liệu trong quá khứ → dùng quá khứ đơn", ex: "In 2010, the unemployment rate stood at 8%. It then fell to 5% in 2015.", band: "fix", tip: "❌ In 2010, the unemployment rate stands at 8%." },
          { e: "NEVER copy the question word-for-word ✅", v: "→ Câu đầu bài PHẢI diễn đạt lại đề, không được chép nguyên văn", ex: "Task: 'The graph shows changes in car sales.' → Write: 'The line graph illustrates how car sales fluctuated over the period.'", band: "fix", tip: "❌ The graph shows changes in car sales... (chép nguyên = 0 điểm Lexical Resource cho câu đó)" }
        ],
        script: {
          title: "Before & After — Band 5 Paragraph Corrected to Band 7",
          content: `<span class="script-label">📊 Full paragraph rewrite — spot every mistake that was fixed</span>
<p class="bad">❌ BAND 5 VERSION (with mistakes):<br>
"The graph show changes in unemployment rate from 2010 until 2020. The number of unemployed people were 5 million in 2010. The unemployment rose to 8 million in 2015. Then it rose by 10 million in 2020. There was an increase of the unemployed people over the period."</p>
<p class="good">✅ BAND 7 CORRECTED VERSION:<br>
"The line graph <strong>illustrates</strong> changes in the unemployment rate <strong>from</strong> 2010 <strong>to</strong> 2020. <strong>The number</strong> of unemployed people <strong>was</strong> 5 million in 2010, which then rose to 8 million in 2015. By 2020, this had grown further <strong>to</strong> 10 million — an increase <strong>in</strong> unemployment of 5 million over the decade."</p>
<p><strong>Fixes applied:</strong><br>
• "show" → "<strong>illustrates</strong>" (paraphrase + subject-verb agreement)<br>
• "until 2020" → "<strong>to 2020</strong>"<br>
• "were" → "<strong>was</strong>" (the number = singular)<br>
• "rose by 10 million" → "<strong>grown to 10 million</strong>" (TO not BY for final value)<br>
• "increase of" → "<strong>increase in</strong>"</p>`
        }
      },
      {
        title: "📋 Sentence Templates by Chart Type — Mẫu câu theo loại biểu đồ",
        items: [
          { e: "Line graph intro: The line graph illustrates [what] from [year] to [year].", v: "→ Mở đầu cho biểu đồ đường", ex: "The line graph illustrates changes in the number of international tourists visiting Vietnam from 2000 to 2020.", band: "b6" },
          { e: "Bar chart intro: The bar chart compares [what] in/across [categories/years].", v: "→ Mở đầu cho biểu đồ cột", ex: "The bar chart compares the average monthly income of workers in five different sectors in 2015.", band: "b6" },
          { e: "Pie chart intro: The pie charts show the proportion of [what] in [year(s)].", v: "→ Mở đầu cho biểu đồ tròn", ex: "The pie charts show the proportion of household expenditure on different categories in 1990 and 2020.", band: "b6" },
          { e: "Table intro: The table presents data on [what] in [year/period].", v: "→ Mở đầu cho bảng số liệu", ex: "The table presents data on the number of tourists from six countries visiting Thailand in 2019.", band: "b6" },
          { e: "Overview template: Overall, [main trend], while [secondary observation].", v: "→ Mẫu overview linh hoạt, dùng được cho mọi biểu đồ", ex: "Overall, energy consumption rose considerably throughout the period, while renewable sources remained the smallest category.", band: "b7" },
          { e: "Body opener: In [year], [subject] stood at [figure], which then [verb] [adverb] to [figure] by [year].", v: "→ Mở đầu body paragraph với số liệu cụ thể", ex: "In 2000, the number of internet users stood at 2 million, which then grew dramatically to 15 million by 2010.", band: "b7" },
          { e: "Switching subject: Turning to [subject], in [year], it stood at [figure] before [V-ing] to [figure] in [year].", v: "→ Chuyển sang đối tượng mới với số liệu", ex: "Turning to France, in 2000, it stood at 30% before rising steadily to 55% in 2010.", band: "b7" }
        ],
        script: {
          title: "Full Band 7 Sample Answer — Line Graph (4-paragraph structure)",
          content: `<span class="script-label">📊 Complete Task 1 answer using all templates — this is what band 7 looks like</span>
<p><em>Task: "The graph shows changes in the use of three types of transport in a city from 2000 to 2020."</em></p>
<p><strong>§ Introduction (paraphrase):</strong><br>
The line graph <strong>illustrates</strong> how the use of three transport modes changed in a city <strong>over a 20-year period</strong>.</p>
<p><strong>§ Overview (no numbers!):</strong><br>
<strong>Overall, it is clear that</strong> car usage grew significantly throughout the period, while cycling saw the most dramatic rise in the final decade. Public transport <strong>remained the most widely used</strong> mode throughout.</p>
<p><strong>§ Body 1 (main trends):</strong><br>
In 2000, public transport <strong>stood at</strong> 60%, <strong>which then declined</strong> gradually to 50% by 2010 <strong>before stabilising</strong> for the remainder of the period. <strong>Meanwhile</strong>, car usage rose from 30% to 40% between 2000 and 2015, <strong>which then remained unchanged at</strong> 40% in 2020.</p>
<p><strong>§ Body 2 (supporting detail):</strong><br>
<strong>Turning to</strong> cycling, in 2000 it stood at just 10%, <strong>which then grew</strong> moderately to 15% by 2015. <strong>After that</strong>, there was a <strong>sharp rise to</strong> 25% by 2020 — the most dramatic change of any single decade. <strong>It is worth noting that</strong> cycling was the only mode to increase in the latter half of the period.</p>
<div class="tip-box">💡 Structure check: Intro (1–2 sentences) → Overview (2 sentences, no numbers) → Body 1 (4–5 sentences, biggest trends) → Body 2 (3–4 sentences, supporting detail). Total: ~170–190 words.</div>`
        }
      }
    ]
  }
];

// ─── State ───────────────────────────────────────────
let activeFilter = "all";

function buildFilters() {
  const bar = document.getElementById("filterBar");
  const filters = [{ id: "all", label: "All", type: "all" }];
  lessons.forEach(l => {
    let label = l.tag;
    if (l.type === "writing") label = l.tag.replace("Lesson ", "L").replace(" — Writing Task 1", " Writing");
    if (l.type === "upgrade") label = "🎯 Band 6.5→7";
    filters.push({ id: l.id, label, type: l.type });
  });
  bar.innerHTML = filters.map(f => {
    const cls = `filter-btn${f.id === activeFilter ? ' active' : ''}${f.type === 'upgrade' ? ' upgrade' : ''}`;
    return `<button class="${cls}" onclick="setFilter('${f.id}')">${f.label}</button>`;
  }).join("");
}

function setFilter(id) { activeFilter = id; buildFilters(); render(); }

function render() {
  const searchQuery = document.getElementById("searchInput").value.toLowerCase().trim();
  const container = document.getElementById("mainContent");
  let totalShown = 0, totalAll = 0, html = "";

  lessons.forEach(lesson => {
    if (activeFilter !== "all" && activeFilter !== lesson.id) return;
    let lessonHtml = "";

    lesson.sections.forEach(section => {
      const filtered = section.items.filter(item => {
        if (!searchQuery) return true;
        return item.e.toLowerCase().includes(searchQuery) ||
               item.v.toLowerCase().includes(searchQuery) ||
               (item.ex && item.ex.toLowerCase().includes(searchQuery)) ||
               (item.tip && item.tip.toLowerCase().includes(searchQuery));
      });
      totalAll += section.items.length;
      totalShown += filtered.length;

      // hide section only if search is active and no cards match
      const showScript = !searchQuery && section.script;

      if (filtered.length === 0 && !showScript) return;

      const cardsHtml = filtered.map(item => {
        const badge = item.band ? `<span class="band-badge band-${item.band}">${item.band === 'fix' ? '⚠ Fix' : item.band.toUpperCase()}</span>` : '';
        return `<div class="card" onclick="this.classList.toggle('flipped')">
          <div class="card-top"><div class="card-front">${item.e}</div>${badge}</div>
          <div class="card-hint">👆 tap to reveal</div>
          <div class="card-back">
            <div class="card-vn">${item.v}</div>
            ${item.ex ? `<div class="card-ex">${item.ex}</div>` : ''}
            ${item.tip ? `<div class="card-tip">${item.tip}</div>` : ''}
            ${item.para ? `<div class="card-para">
              <div class="card-para-label">✏️ Sample Paraphrase</div>
              <div class="card-para-original">❌ Original: <span>${item.para.original}</span></div>
              <div class="card-para-rephrased">✅ Rephrased: <span>${item.para.rephrased}</span></div>
            </div>` : ''}
          </div>
        </div>`;
      }).join("");

      const scriptHtml = showScript ? `<details class="script-panel">
        <summary>📄 Sample Script — ${section.script.title}</summary>
        <div class="script-body">${section.script.content}</div>
      </details>` : '';

      lessonHtml += `<div class="section-block">
        <div class="section-title">${section.title}</div>
        ${filtered.length > 0 ? `<div class="card-grid">${cardsHtml}</div>` : ''}
        ${scriptHtml}
      </div>`;
    });

    if (lessonHtml) {
      const hCls = lesson.type === 'upgrade' ? 'upgrade' : 'writing';
      const tCls = lesson.type === 'upgrade' ? 'upgrade' : '';
      html += `<div class="lesson-block">
        <div class="lesson-header ${hCls}">
          <div class="lesson-tag ${tCls}">${lesson.tag}</div>
          <div class="lesson-title">${lesson.title}</div>
          ${lesson.subtitle ? `<div class="lesson-subtitle">${lesson.subtitle}</div>` : ''}
        </div>
        <div class="lesson-body">${lessonHtml}</div>
      </div>`;
    }
  });

  if (!html) html = `<div class="empty">😕 No expressions found.</div>`;
  container.innerHTML = html;
  document.getElementById("counter").textContent = `${totalShown} / ${totalAll} expressions`;
}

function flipAll() {
  const cards = document.querySelectorAll(".card");
  const allFlipped = [...cards].every(c => c.classList.contains("flipped"));
  cards.forEach(c => allFlipped ? c.classList.remove("flipped") : c.classList.add("flipped"));
}

buildFilters();
render();
</script>
